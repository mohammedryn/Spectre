; SPECTER C-03-E Validation Tool
; Jitter & frequency measurement for Teensy 4.1 acquisition timer
; Flash this onto an ESP32-S3 (tested with ESP32-S3-BOX-3)
;
; Usage:
;   cd scripts/esp32_jitter_measure
;   pio run -t upload && pio device monitor

[env:esp32s3-jitter]
platform     = espressif32
board        = esp32-s3-devkitc-1
framework    = arduino

; USB-CDC serial — required for ESP32-S3 boards without a UART bridge.
; If your board has a CP2102/CH340 USB bridge instead, remove these two flags.
build_flags =
    -std=c++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

monitor_speed = 115200
upload_speed  = 921600
